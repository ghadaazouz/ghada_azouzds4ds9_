# Nom de l'application et port
spring.application.name=ghadaazouz
server.port=8089

# Configuration de la base de donnķes MySQL
# Note : Attention Ó ne pas laisser d'espace aprĶs "localhost:"
spring.datasource.url=jdbc:mysql://localhost:3306/ghadaazouz4ds9?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Configuration JPA / Hibernate
spring.jpa.show-sql=true
# Utiliser "create" la premiĶre fois pour gķnķrer les 8 tables proprement, 
# puis repasser en "update" pour garder les donnķes.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect